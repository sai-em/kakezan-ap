<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>かけ算スタンプ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --g1: #5c7a6e; --g2: #7fa898; --g3: #a8c5bb;
    --g4: #d4e6e0; --g5: #eef5f2; --g6: #f6faf8;
    --accent: #4a6e62; --text: #2c3e37; --muted: #8fa89f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
    background: var(--g6); min-height: 100vh;
    padding: 24px 16px 40px; color: var(--text);
  }
  header { text-align: center; margin-bottom: 22px; }
  header h1 { font-size: 1.45rem; font-weight: 800; letter-spacing: .06em; color: var(--text); }
  header h1 span { color: var(--g1); }
  header p { font-size: 0.72rem; color: var(--muted); margin-top: 3px; letter-spacing: .12em; text-transform: uppercase; }

  /* AUTH BAR */
  .auth-bar {
    max-width: 400px; margin: 0 auto 16px;
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border-radius: 14px; padding: 10px 16px;
    box-shadow: 0 2px 12px #5c7a6e10;
  }
  .auth-user { display: flex; align-items: center; gap: 10px; }
  .auth-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--g4); display: flex; align-items: center; justify-content: center;
    font-size: 1rem; font-weight: 800; color: var(--g1);
  }
  .auth-user span { font-size: 0.85rem; font-weight: 700; color: var(--text); }
  .auth-btn {
    padding: 7px 16px; border-radius: 10px; border: none;
    font-size: 0.8rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .auth-btn.login { background: var(--g1); color: #fff; }
  .auth-btn.login:hover { background: var(--accent); }
  .auth-btn.logout { background: var(--g5); color: var(--muted); border: 1.5px solid var(--g4); }
  .auth-btn.logout:hover { color: var(--g1); border-color: var(--g2); }

  /* LOGIN MODAL */
  .login-overlay {
    display: none; position: fixed; inset: 0;
    background: #1a2e2899; z-index: 200;
    align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  .login-overlay.show { display: flex; }
  .login-box {
    background: #fff; border-radius: 26px; padding: 32px 28px;
    max-width: 320px; width: 92%; text-align: center;
    box-shadow: 0 20px 60px #0002;
    animation: modalPop .35s cubic-bezier(.34,1.56,.64,1);
  }
  .login-box h2 { font-size: 1.15rem; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .login-box .sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 20px; }
  .login-tabs { display: flex; background: var(--g5); border-radius: 10px; padding: 4px; margin-bottom: 20px; gap: 4px; }
  .login-tab {
    flex: 1; padding: 8px; border-radius: 8px; border: none;
    font-size: 0.8rem; font-weight: 700; cursor: pointer;
    background: transparent; color: var(--muted); transition: all .2s;
  }
  .login-tab.active { background: #fff; color: var(--g1); box-shadow: 0 1px 6px #0001; }
  .login-field { margin-bottom: 12px; text-align: left; }
  .login-field label { font-size: 0.72rem; font-weight: 700; color: var(--muted); letter-spacing: .06em; display: block; margin-bottom: 5px; }
  .login-field input {
    width: 100%; padding: 11px 14px; border-radius: 10px;
    border: 1.5px solid var(--g4); font-size: 1rem; color: var(--text);
    background: var(--g6); outline: none; transition: border .2s;
    font-weight: 700; letter-spacing: .1em;
  }
  .login-field input:focus { border-color: var(--g2); }
  .login-error { font-size: 0.78rem; color: #b07070; min-height: 18px; margin-bottom: 10px; }
  .login-submit {
    width: 100%; padding: 13px; border-radius: 12px; border: none;
    background: linear-gradient(90deg, var(--g1), var(--g2));
    color: #fff; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; letter-spacing: .04em; transition: opacity .2s;
  }
  .login-submit:hover { opacity: .88; }

  /* TABS */
  .tabs {
    display: flex; gap: 5px; margin-bottom: 20px;
    background: var(--g4); padding: 5px; border-radius: 14px;
    max-width: 380px; margin-left: auto; margin-right: auto;
  }
  .tab {
    flex: 1; padding: 9px 0; border-radius: 10px; border: none; cursor: pointer;
    font-size: 0.8rem; font-weight: 700; color: var(--muted);
    background: transparent; transition: all .2s; letter-spacing: .03em;
  }
  .tab i { margin-right: 4px; }
  .tab.active { background: #fff; color: var(--g1); box-shadow: 0 2px 10px #5c7a6e18; }

  .panel { display: none; }
  .panel.active { display: block; }

  .card {
    background: #fff; border-radius: 22px; padding: 24px 20px;
    max-width: 400px; margin: 0 auto; box-shadow: 0 4px 24px #5c7a6e12;
  }

  .dan-row { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
  .dan-row label { font-size: 0.75rem; color: var(--muted); font-weight: 700; letter-spacing: .08em; }
  .dan-row select {
    padding: 7px 14px; border-radius: 10px; border: 1.5px solid var(--g4);
    font-size: 0.92rem; color: var(--g1); font-weight: 700;
    background: var(--g6); cursor: pointer; outline: none;
  }

  .q-progress-wrap { margin-bottom: 20px; }
  .q-progress-label { display: flex; justify-content: space-between; font-size: 0.72rem; color: var(--muted); font-weight: 600; margin-bottom: 5px; letter-spacing: .04em; }
  .q-bar-bg { height: 6px; background: var(--g5); border-radius: 99px; overflow: hidden; }
  .q-bar-fill { height: 100%; background: linear-gradient(90deg, var(--g1), var(--g3)); border-radius: 99px; transition: width .35s; }

  .question { font-size: 2.7rem; font-weight: 900; color: var(--text); text-align: center; letter-spacing: .02em; margin-bottom: 24px; }
  .question .op { color: var(--g1); }

  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .choice-btn {
    padding: 16px; border-radius: 14px; border: 2px solid var(--g4);
    font-size: 1.5rem; font-weight: 800; color: var(--text);
    background: var(--g6); cursor: pointer; transition: all .15s;
  }
  .choice-btn:hover:not(:disabled) { border-color: var(--g2); background: var(--g5); transform: translateY(-2px); }
  .choice-btn.correct { background: #d4ede5; border-color: var(--g1); color: var(--accent); }
  .choice-btn.wrong   { background: #f5e0e0; border-color: #b07070; color: #7a3a3a; }

  .feedback { text-align: center; font-size: 0.95rem; font-weight: 700; min-height: 24px; margin-bottom: 12px; }
  .feedback.ok { color: var(--g1); }
  .feedback.ng { color: #b07070; }

  .next-btn {
    display: none; width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: linear-gradient(90deg, var(--g1), var(--g2));
    color: #fff; font-size: 0.95rem; font-weight: 800;
    cursor: pointer; letter-spacing: .05em; transition: opacity .2s;
  }
  .next-btn:hover { opacity: .85; }

  .stamp-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .stamp-meta .label { font-size: 0.72rem; color: var(--muted); font-weight: 700; letter-spacing: .1em; }
  .stamp-meta .count { font-size: 1rem; font-weight: 800; color: var(--g1); }
  .s-bar-bg { height: 6px; background: var(--g5); border-radius: 99px; overflow: hidden; margin-bottom: 18px; }
  .s-bar-fill { height: 100%; background: linear-gradient(90deg, var(--g1), var(--g3)); border-radius: 99px; transition: width .4s; }
  .stamp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
  .stamp-cell {
    aspect-ratio: 1; border-radius: 12px; border: 2px dashed var(--g4);
    background: var(--g6); display: flex; align-items: center;
    justify-content: center; font-size: 1.2rem; overflow: hidden;
  }
  .stamp-cell.filled { border-color: var(--g2); background: var(--g5); animation: pop .3s ease; }
  .stamp-cell img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  @keyframes pop { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }

  .custom-preview {
    width: 80px; height: 80px; border-radius: 16px; border: 2px dashed var(--g3);
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; margin: 0 auto 12px; overflow: hidden; background: var(--g5);
  }
  .custom-preview img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
  .custom-label { font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 16px; }
  .upload-btn {
    display: block; width: 100%; padding: 13px; border-radius: 14px;
    border: 1.5px solid var(--g2); background: #fff; color: var(--g1);
    font-size: 0.92rem; font-weight: 800; text-align: center;
    cursor: pointer; transition: all .2s; margin-bottom: 10px;
  }
  .upload-btn:hover { background: var(--g5); }
  #fileInput { display: none; }
  .reset-btn {
    display: block; width: 100%; padding: 11px; border-radius: 14px;
    border: 1.5px solid var(--g4); background: #fff; color: var(--muted);
    font-size: 0.85rem; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .reset-btn:hover { border-color: var(--g3); color: var(--g1); }

  /* MODALS */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: #1a2e2888;
    z-index: 100; align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 26px; padding: 36px 28px;
    max-width: 310px; width: 90%; text-align: center;
    animation: modalPop .4s cubic-bezier(.34,1.56,.64,1);
    box-shadow: 0 20px 60px #2c3e3722;
  }
  @keyframes modalPop { from{transform:scale(.4) rotate(-6deg);opacity:0} to{transform:scale(1) rotate(0);opacity:1} }
  .modal-icon { font-size: 3.2rem; margin-bottom: 8px; }
  .modal h2 { font-size: 1.3rem; font-weight: 900; color: var(--text); margin-bottom: 8px; }
  .modal p { font-size: 0.85rem; color: var(--muted); line-height: 1.7; margin-bottom: 22px; }
  .modal p strong { color: var(--g1); }
  .modal-btn {
    width: 100%; padding: 14px; border-radius: 14px; border: none;
    background: linear-gradient(90deg, var(--g1), var(--g2));
    color: #fff; font-size: 0.95rem; font-weight: 800; cursor: pointer;
    animation: btnPulse 1s ease-in-out infinite;
  }
  @keyframes btnPulse { 0%,100%{box-shadow:0 0 0 0 #5c7a6e44} 50%{box-shadow:0 0 0 8px #5c7a6e00} }
  .bigstar-icon { font-size: 3.5rem; margin-bottom: 8px; animation: pulse 1.2s ease-in-out infinite; display: inline-block; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

  /* EFFECTS */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
  .confetti-piece { position: absolute; top: -20px; border-radius: 2px; animation: confettiFall linear forwards; }
  @keyframes confettiFall { 0%{transform:translateY(0) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(720deg);opacity:0} }
  .stamp-flash { position: fixed; inset: 0; z-index: 98; background: radial-gradient(circle,#a8c5bb88 0%,transparent 70%); pointer-events: none; opacity: 0; animation: flashIn .5s ease forwards; }
  @keyframes flashIn { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
  .correct-burst { position: fixed; pointer-events: none; z-index: 97; font-size: 1.6rem; font-weight: 900; color: var(--g1); white-space: nowrap; animation: burstUp .7s cubic-bezier(.22,.68,0,1.4) forwards; }
  @keyframes burstUp { 0%{transform:translateY(0) scale(.5);opacity:1} 60%{transform:translateY(-60px) scale(1.15);opacity:1} 100%{transform:translateY(-90px) scale(1);opacity:0} }
  .mini-confetti-piece { position: fixed; pointer-events: none; z-index: 96; width: 7px; height: 7px; border-radius: 2px; animation: miniFall linear forwards; }
  @keyframes miniFall { 0%{opacity:1} 100%{opacity:0;transform:translate(var(--tx),var(--ty)) rotate(540deg)} }

  .save-status { text-align: center; font-size: 0.7rem; color: var(--muted); margin-top: 10px; min-height: 16px; }
</style>
</head>
<body>

<header>
  <h1>かけ算 <span>スタンプ</span></h1>
  <p>Multiplication Stamp</p>
</header>

<!-- AUTH BAR -->
<div class="auth-bar">
  <div class="auth-user" id="authUser">
    <div class="auth-avatar" id="authAvatar"><i class="fa-regular fa-circle-user"></i></div>
    <span id="authName" style="color:var(--muted)">ログインしていません</span>
  </div>
  <button class="auth-btn login" id="authBtn">ログイン</button>
</div>

<!-- LOGIN MODAL -->
<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>かけ算スタンプ</h2>
    <p class="sub">ニックネームと4けたのあんごうを いれてね</p>
    <div class="login-tabs">
      <button class="login-tab active" id="tabRegister">はじめて</button>
      <button class="login-tab" id="tabLogin">もどる</button>
    </div>
    <div class="login-field">
      <label>ニックネーム</label>
      <input type="text" id="inputName" placeholder="たろう" maxlength="10">
    </div>
    <div class="login-field">
      <label>4けたのあんごう</label>
      <input type="password" id="inputPin" placeholder="0000" maxlength="4" inputmode="numeric">
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-submit" id="loginSubmit">はじめる！</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab active" id="tab-quiz"><i class="fa-regular fa-pen-to-square"></i>もんだい</button>
  <button class="tab" id="tab-stamp"><i class="fa-regular fa-star"></i>スタンプ</button>
  <button class="tab" id="tab-custom"><i class="fa-regular fa-image"></i>カスタム</button>
</div>

<!-- QUIZ -->
<div class="panel active" id="panel-quiz">
  <div class="card">
    <div class="dan-row">
      <label>DAN</label>
      <select id="danSelect">
        <option value="0">ランダム 1〜9</option>
        <option value="1">1のだん</option><option value="2">2のだん</option>
        <option value="3">3のだん</option><option value="4">4のだん</option>
        <option value="5">5のだん</option><option value="6">6のだん</option>
        <option value="7">7のだん</option><option value="8">8のだん</option>
        <option value="9">9のだん</option>
      </select>
    </div>
    <div class="q-progress-wrap">
      <div class="q-progress-label"><span>QUESTION</span><span id="qCount">1 / 30</span></div>
      <div class="q-bar-bg"><div class="q-bar-fill" id="qBar" style="width:0%"></div></div>
    </div>
    <div class="question" id="question"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback" id="feedback"></div>
    <button class="next-btn" id="nextBtn">つぎへ &nbsp;<i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>

<!-- STAMP -->
<div class="panel" id="panel-stamp">
  <div class="card">
    <div class="stamp-meta">
      <span class="label">STAMP CARD</span>
      <span class="count" id="stampCount">0 / 20</span>
    </div>
    <div class="s-bar-bg"><div class="s-bar-fill" id="sBar" style="width:0%"></div></div>
    <div class="stamp-grid" id="stampGrid"></div>
    <div class="save-status" id="saveStatus"></div>
  </div>
</div>

<!-- CUSTOM -->
<div class="panel" id="panel-custom">
  <div class="card">
    <div class="custom-preview" id="customPreview">
      <i class="fa-regular fa-star" style="color:var(--g2)"></i>
    </div>
    <p class="custom-label">スタンプのイラストをカスタマイズ</p>
    <label class="upload-btn" for="fileInput">
      <i class="fa-regular fa-folder-open"></i>&nbsp; がぞうをアップロード
    </label>
    <input type="file" id="fileInput" accept="image/*">
    <button class="reset-btn" id="resetStampBtn">デフォルトにもどす</button>
    <div class="save-status" id="saveStatusCustom"></div>
  </div>
</div>

<!-- SET COMPLETE MODAL -->
<div class="modal-overlay" id="setModal">
  <div class="modal">
    <div class="modal-icon"><i class="fa-regular fa-circle-check" style="color:var(--g1)"></i></div>
    <h2>30もん クリア！</h2>
    <p>スタンプを <strong>1こ</strong> ゲットしたよ！<br>あと <strong id="remaining"></strong> こでビッグスター</p>
    <button class="modal-btn" id="setModalBtn">もう一回！ &nbsp;<i class="fa-solid fa-arrow-right"></i></button>
  </div>
</div>

<!-- BIG STAR MODAL -->
<div class="modal-overlay" id="bigModal">
  <div class="modal">
    <div class="bigstar-icon"><i class="fa-regular fa-star" style="color:var(--g1)"></i></div>
    <h2>ビッグスター！</h2>
    <p>スタンプが <strong>20こ</strong> ぜんぶたまったよ！<br>おうちの人に みせてね</p>
    <button class="modal-btn" id="bigModalBtn">もういちど はじめる</button>
  </div>
</div>

<!-- Firebase compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey: "AIzaSyAo74OyBK2D0aSkpju1kPOVThKU8N_kRWg",
  authDomain: "chiiku-f0712.firebaseapp.com",
  projectId: "chiiku-f0712",
  storageBucket: "chiiku-f0712.firebasestorage.app",
  messagingSenderId: "939920994832",
  appId: "1:939920994832:web:c0cba8ffaea6fc81491095"
});
const db = firebase.firestore();

// --- STATE ---
const TOTAL_Q = 30;
let stamps = 0, customSrc = null, qNum = 0, correctAns = 0, answered = false;
let currentUserId = null, currentUserName = null;
let isRegisterMode = true;

// --- LOGIN UI ---
function showLoginModal() {
  document.getElementById('loginOverlay').classList.add('show');
  document.getElementById('inputName').focus();
}
function hideLoginModal() {
  document.getElementById('loginOverlay').classList.remove('show');
  document.getElementById('loginError').textContent = '';
}

document.getElementById('tabRegister').addEventListener('click', () => {
  isRegisterMode = true;
  document.getElementById('tabRegister').classList.add('active');
  document.getElementById('tabLogin').classList.remove('active');
  document.getElementById('loginSubmit').textContent = 'はじめる！';
  document.getElementById('loginError').textContent = '';
});
document.getElementById('tabLogin').addEventListener('click', () => {
  isRegisterMode = false;
  document.getElementById('tabLogin').classList.add('active');
  document.getElementById('tabRegister').classList.remove('active');
  document.getElementById('loginSubmit').textContent = 'もどる！';
  document.getElementById('loginError').textContent = '';
});

document.getElementById('loginSubmit').addEventListener('click', handleLogin);
document.getElementById('inputPin').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

async function handleLogin() {
  const name = document.getElementById('inputName').value.trim();
  const pin  = document.getElementById('inputPin').value.trim();
  const errEl = document.getElementById('loginError');

  if (!name) { errEl.textContent = 'ニックネームをいれてね'; return; }
  if (!/^\d{4}$/.test(pin)) { errEl.textContent = 'あんごうは4けたのすうじだよ'; return; }

  // IDはニックネームをそのままキーに（小文字化）
  const uid = 'user_' + name.toLowerCase().replace(/\s+/g, '_');
  const docRef = db.collection('users').doc(uid);

  try {
    const snap = await docRef.get();
    if (isRegisterMode) {
      if (snap.exists) { errEl.textContent = 'そのなまえはもうつかわれているよ'; return; }
      await docRef.set({ name, pin, stamps: 0, customStampUrl: null });
      loginSuccess(uid, name, 0, null);
    } else {
      if (!snap.exists) { errEl.textContent = 'そのなまえはみつからないよ'; return; }
      const d = snap.data();
      if (d.pin !== pin) { errEl.textContent = 'あんごうがちがうよ'; return; }
      loginSuccess(uid, d.name, d.stamps || 0, d.customStampUrl || null);
    }
  } catch(e) { errEl.textContent = 'エラーがおきたよ。もういちどためしてね'; console.error(e); }
}

function loginSuccess(uid, name, s, cs) {
  currentUserId = uid;
  currentUserName = name;
  stamps = s;
  customSrc = cs;
  hideLoginModal();
  // update auth bar
  const initial = name.charAt(0).toUpperCase();
  document.getElementById('authAvatar').textContent = initial;
  document.getElementById('authName').textContent = name;
  document.getElementById('authName').style.color = 'var(--text)';
  const btn = document.getElementById('authBtn');
  btn.textContent = 'ログアウト';
  btn.className = 'auth-btn logout';
  renderStamps(); updatePreview();
}

document.getElementById('authBtn').addEventListener('click', () => {
  if (currentUserId) {
    currentUserId = null; currentUserName = null;
    stamps = 0; customSrc = null;
    document.getElementById('authAvatar').innerHTML = '<i class="fa-regular fa-circle-user"></i>';
    document.getElementById('authName').textContent = 'ログインしていません';
    document.getElementById('authName').style.color = 'var(--muted)';
    const btn = document.getElementById('authBtn');
    btn.textContent = 'ログイン'; btn.className = 'auth-btn login';
    renderStamps(); updatePreview();
  } else {
    showLoginModal();
  }
});

// --- FIRESTORE SAVE ---
async function saveUserData() {
  if (!currentUserId) return;
  setSaveStatus('saving');
  try {
    await db.collection('users').doc(currentUserId).update({
      stamps, customStampUrl: customSrc || null
    });
    setSaveStatus('saved');
  } catch(e) { setSaveStatus('error'); console.error(e); }
}

function setSaveStatus(state) {
  const els = [document.getElementById('saveStatus'), document.getElementById('saveStatusCustom')];
  const map = { saving: '保存中…', saved: '✓ 保存しました', error: '保存に失敗しました' };
  els.forEach(el => { if (el) el.textContent = map[state] || ''; });
  if (state === 'saved') setTimeout(() => els.forEach(el => { if (el) el.textContent = ''; }), 2000);
}

// --- CUSTOMIZE ---
function compressImage(file, maxSize = 400) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

document.getElementById('fileInput').addEventListener('change', async e => {
  const file = e.target.files[0]; if (!file) return;
  customSrc = await compressImage(file);
  await saveUserData();
  updatePreview(); renderStamps();
});

document.getElementById('resetStampBtn').addEventListener('click', async () => {
  customSrc = null;
  await saveUserData();
  updatePreview(); renderStamps();
});

// --- QUIZ ---
function rnd(n) { return Math.floor(Math.random() * n) + 1; }
function startNewSet() { qNum = 0; nextQuestion(); }

function nextQuestion() {
  if (qNum >= TOTAL_Q) {
    stamps = Math.min(stamps + 1, 20);
    saveUserData();
    renderStamps();
    flashScreen(); launchConfetti();
    setTimeout(() => {
      if (stamps >= 20) document.getElementById('bigModal').classList.add('show');
      else {
        document.getElementById('remaining').textContent = 20 - stamps;
        document.getElementById('setModal').classList.add('show');
      }
    }, 600);
    return;
  }
  answered = false;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('nextBtn').style.display = 'none';
  qNum++;
  document.getElementById('qCount').textContent = qNum + ' / ' + TOTAL_Q;
  document.getElementById('qBar').style.width = ((qNum - 1) / TOTAL_Q * 100) + '%';

  const dan = parseInt(document.getElementById('danSelect').value);
  const a = dan === 0 ? rnd(9) : dan, b = rnd(9);
  correctAns = a * b;
  document.getElementById('question').innerHTML =
    `${a} <span class="op">×</span> ${b} <span class="op">=</span> ?`;

  const set = new Set([correctAns]);
  while (set.size < 4) set.add(rnd(9) * rnd(9));
  const el = document.getElementById('choices');
  el.innerHTML = '';
  [...set].sort(() => Math.random() - .5).forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn'; btn.textContent = v;
    btn.addEventListener('click', () => answer(btn, v));
    el.appendChild(btn);
  });
}

function answer(btn, val) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback');
  if (val === correctAns) {
    btn.classList.add('correct');
    fb.textContent = '正解！'; fb.className = 'feedback ok';
    miniCorrectEffect(btn);
  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (+b.textContent === correctAns) b.classList.add('correct');
    });
    fb.textContent = `こたえは ${correctAns} だよ`; fb.className = 'feedback ng';
  }
  document.getElementById('nextBtn').style.display = 'block';
}

// --- TABS ---
function showTab(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  el.classList.add('active');
  if (name === 'stamp') renderStamps();
}

// --- STAMPS ---
function renderStamps() {
  const grid = document.getElementById('stampGrid');
  grid.innerHTML = '';
  for (let i = 0; i < 20; i++) {
    const cell = document.createElement('div');
    cell.className = 'stamp-cell' + (i < stamps ? ' filled' : '');
    if (i < stamps) {
      if (customSrc) {
        const img = document.createElement('img'); img.src = customSrc; cell.appendChild(img);
      } else {
        cell.innerHTML = '<i class="fa-solid fa-star" style="color:var(--g1)"></i>';
      }
    }
    grid.appendChild(cell);
  }
  document.getElementById('stampCount').textContent = stamps + ' / 20';
  document.getElementById('sBar').style.width = (stamps / 20 * 100) + '%';
}

function updatePreview() {
  const prev = document.getElementById('customPreview');
  prev.innerHTML = customSrc
    ? `<img src="${customSrc}">`
    : '<i class="fa-regular fa-star" style="color:var(--g2)"></i>';
}

// --- EFFECTS ---
function miniCorrectEffect(btn) {
  const r = btn.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  const txt = document.createElement('div');
  txt.className = 'correct-burst'; txt.textContent = '⭕ せいかい！';
  txt.style.cssText = `left:${cx - 60}px;top:${cy}px;`;
  document.body.appendChild(txt);
  setTimeout(() => txt.remove(), 750);
  const colors = ['#5c7a6e','#a8c5bb','#f9c74f','#f8961e','#90be6d'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'mini-confetti-piece';
    const angle = (i / 18) * 360, dist = 50 + Math.random() * 50;
    p.style.cssText = `left:${cx}px;top:${cy}px;
      background:${colors[i % colors.length]};
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
      --tx:${Math.cos(angle * Math.PI / 180) * dist}px;
      --ty:${Math.sin(angle * Math.PI / 180) * dist - 30}px;
      animation-duration:${0.5 + Math.random() * 0.3}s;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 900);
  }
}
function launchConfetti() {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap'; document.body.appendChild(wrap);
  const colors = ['#5c7a6e','#a8c5bb','#f9c74f','#f8961e','#f94144','#90be6d','#43aa8b','#fff'];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    const size = 7 + Math.random() * 9;
    p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size*(0.4+Math.random())}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${1.4+Math.random()*1.8}s;
      animation-delay:${Math.random()*0.6}s;`;
    wrap.appendChild(p);
  }
  setTimeout(() => wrap.remove(), 3500);
}
function flashScreen() {
  const f = document.createElement('div'); f.className = 'stamp-flash';
  document.body.appendChild(f); setTimeout(() => f.remove(), 600);
}

// --- EVENT LISTENERS ---
document.getElementById('danSelect').addEventListener('change', startNewSet);
document.getElementById('nextBtn').addEventListener('click', nextQuestion);
document.getElementById('setModalBtn').addEventListener('click', () => {
  document.getElementById('setModal').classList.remove('show'); startNewSet();
});
document.getElementById('bigModalBtn').addEventListener('click', async () => {
  stamps = 0; await saveUserData();
  document.getElementById('bigModal').classList.remove('show');
  renderStamps(); startNewSet();
});
document.getElementById('tab-quiz').addEventListener('click', e => showTab('quiz', e.currentTarget));
document.getElementById('tab-stamp').addEventListener('click', e => showTab('stamp', e.currentTarget));
document.getElementById('tab-custom').addEventListener('click', e => showTab('custom', e.currentTarget));

// --- INIT ---
startNewSet();
showLoginModal();
</script>
